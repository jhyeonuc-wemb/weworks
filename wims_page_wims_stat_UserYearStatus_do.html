<script type="text/javascript">
var search_type = '';
var search_val;
var form = document.form;

//1. jQuery Init 
$(function() {

	gfPageTitle();//메뉴제목
	gfPageGrade(); //권한관리
	
	//그리드 호버 색상 세팅 (innerPage.css > tr.hover {})
	$(".grid_middle table").delegate('td','mouseover mouseleave', function(e) {
	    if (e.type == 'mouseover') {

	    } else {
	        $(this).parent().removeClass("hover");
	    }
	});
	
	$('#tabs_type').tabslet({
		active: 2
	});
	
	$('#tabs_val').tabslet({
		active: 3
	});
	
	$("#search_status").select2({
		placeholder : '클릭후 입력하세요'
	}); 
	
	$(".tooltip").tooltip({
		delay : 0,
		showURL: false,
		opacity: 1,
		content:function(){
            return this.getAttribute("title");
        }
	});
});
	
//document.ready 
$(document).ready(function(){

// 	$("#search_dept").val("236f113d-1878-44ae-9e6e-749ef13421c2");	//  팀 - 컨설팅그룹
	$("#search_dept").val("");	//  팀 - 컨설팅그룹
	$("#search_year").val("2026");
	$("#search_year_end").val("2026");
	$("#search_month_end").val("12");
// 	$("#search_status").val("");
	$("#search_user_status").val('CD00000025');	// 근무중
	fnSearch('',"mm");
	fnYearChange();
});

/**
 * 조회 
 * type ; 업무시간기준 / 비업무시간 
 * unit : 단위 ( hour / Man-Day-mm / Man-Month-mm )
 */
function fnSearch(type,val){

	 var strtDate = $("#search_year").val()+$("#search_month").val();
	 var endDate = $("#search_year_end").val()+$("#search_month_end").val();

	 var strtYear = parseInt(strtDate.substring(0,4));
	 var strtMonth = parseInt(strtDate.substring(4,6));

	 var endYear = parseInt(endDate.substring(0,4));
	 var endMonth = parseInt(endDate.substring(4,6));

	 var month = (endYear - strtYear)* 12 + (endMonth - strtMonth)+1;
	
	 //유효성검사
	 if(strtDate>endDate){
		 alert("시작 년월이 종료 년월보다 클 수 없습니다.");
		 return false;
	 }
	 
	 //최대 20개월 까지만 검색 가능
	 if(month>20){
		 alert("최대 20개월 데이터만 검색 가능합니다.");
		 return false;
	 }

	if(type != ""){
		if(type == "W"){
			type = "";	
		}
		search_type = type;
	}
	if(val != ""){
		search_val = val;
	}
	/* grid 데이터 조회 */
	$.ajax({
	     type:"POST"
	    ,dataType: "html"
	    ,url: "/wims/stat/UserYearStatusGrid.do"
	    ,data:		
	    {	
	    	search_type : search_type,
			search_val : search_val,
			search_year : $("#search_year").val()+$("#search_month").val(),
			search_edt : $("#search_year_end").val()+$("#search_month_end").val(),
			search_status : $("#search_status").val().join(","),
			search_user_name : $("#search_user_name").val(),
			search_dept : $("#search_dept").val(),
			search_user_status : $("#search_user_status").val(),
			currYear:'2026',
			currMonth:'02',
			selectMonth : month
		}
	    ,success:function(res){
	    	$('.userGrid').html(res);
	    	
	    	// 조회결과 별로 월별 현황 td 설정
	    	setMonth_edit($("#search_year option:selected").text() , $("#search_month option:selected").text() , "2026" , "02" , "monthTh" , "monthTd",month);
	    }
	    ,beforeSend:function(){
	    	fullWidth = document.documentElement.clientWidth;
			ajaxLoader.send("로딩중입니다.","#aaa","#fff","172",fullWidth);
	    }
	    ,complete:function(){
	    	 ajaxLoader.destroy();
	    }
	    ,error:function(e){
	    	  alert("알수 없는 에러가 발생 하였습니다.\n관리자에게 문의하시기 바랍니다.");
	    }
	});
	
}


function fnYearChange(){
	
	 
	ajax('TeamList.do', 'HTML',
		{
			search_year : $("#search_year").val(),
			
		}, function (data){
			$("#search_dept").html(data);
		}
	);


}





//엑셀 다운
function fnExcel(obj) {
	var strtDate = $("#search_year").val()+$("#search_month").val();
	var endDate = $("#search_year_end").val()+$("#search_month_end").val();
	
	var strtYear = parseInt(strtDate.substring(0,4));
	var strtMonth = parseInt(strtDate.substring(4,6));
	
	var endYear = parseInt(endDate.substring(0,4));
	var endMonth = parseInt(endDate.substring(4,6));
	
	var month = (endYear - strtYear)* 12 + (endMonth - strtMonth)+1;
	 
	var excel_search_text = "";
	excel_search_text += "시작년도 : "+$("#search_year option:selected").val();
	excel_search_text += " /  시작월 : "+$("#search_month option:selected").val();
	excel_search_text += " /  종료년도 : "+$("#search_year_end option:selected").val();
	excel_search_text += " /  종료월 : "+$("#search_month_end option:selected").val();
	excel_search_text += " /  분류 : "+$("#search_status option:selected").text();
	excel_search_text += " /  팀 : "+$("#search_dept option:selected").text();
	excel_search_text += " /  이름 : "+$("#search_user_name").val();
	excel_search_text += " /  상태 : "+$("#search_user_status option:selected").text();
	
	excel_search_text += " /  업무시간기준 : "+$("#tabs_type").find('.active').text();
	excel_search_text += " /  단위 : "+$("#tabs_val").find('.active').text();

	form.search_type.value = search_type;
	form.search_val.value = search_val;
	form.excel_search_text.value = excel_search_text;
	form.selectMonth.value = month;
	form.search_dept_edit.value = $("#search_dept").val();
	
	form.action = "/wims/stat/UserYearStatusExcel.do";
	form.submit();
}

//페이지 이동
function fnUserYearDetail(u_name){
	parent.menuForm.menu_name.value = "인력 운영 현황 상세";
	parent.menuForm.menu_navi.value = "직원관리 > 인력 운영 현황 상세";
	
	form.search_user_name.value = u_name;
	form.search_type.value = search_type;
	form.search_val.value = search_val;
	form.action = "/wims/stat/UserYearDetail.do";
	form.submit();
}
</script>
