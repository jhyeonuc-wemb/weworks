		/**
		 * 금주인지 체크.
		 * @param selDay 선택한 일자.
		 * @return -1 // 금주가 아닌 지난주. 0 금주(실행) // 1 계획.
		 */
		function checkCurrentWeek(selDay){
		
			var isPlan=false,
					isToday=false,
					toDay = '',
					tmpCurDay,
					lastDay='';
			var curLeng=currentWeekDay.length;

			if(currentWeekDay[0].dd > selDay) {
				return -1;
			}
           /* an. 막음.
			for(var j=0; j < curLeng; j++) {
				tmpCurDay = currentWeekDay[j];

				//마자막날 금요일 - 자동등록 날짜				
				if(j==curLeng-3){
					$('#next_date').val( fnDateFormat(tmpCurDay.dd));
				}
			} */
			
			for(var j=0; j < curLeng; j++) {
				tmpCurDay = currentWeekDay[j];

				if(!isToday && tmpCurDay.today == 'Y') {
					isToday=true;
					toDay = tmpCurDay.dd;
				}

				if(selDay == tmpCurDay.dd) {
					if(toDay == selDay) { // 실행.
						return 0;
					}
					// 날짜가 다르다면 today 지났는지 여부로.
					// 금일 날짜가 지났으면 계획 : 실행.
					return (isToday)? 1 : 0;
				}
				
			}
			return 1;
		};
