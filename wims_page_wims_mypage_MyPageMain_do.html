function validate(){
	
	if($("#name").val() == "") {
		alert("이름을 입력해주십시오.");
		return false;
	} else if ( /\s/g.test($("#name").val()) || /[^ㄱ-ㅣ가-힣\w\s]/i.test($("#name").val()) ) {
		alert("이름에 공백문자 또는 특수문자는 입력할 수 없습니다.");
		return false;
	}
	
	if ( $("#password").val() == "" ) {
		alert("비밀번호를 입력해주십시오.");
		return false;
	}
	
	return true;
}

//자동하이픈 생성
function chk_tel(value, field){
 var str;
 str = checkDigit(value);
 len = str.length;
 
 if(len==8){
  if(str.substring(0,2)==02){
   error_numbr(str, field);
  }else{
   field.value  = phone_format(1,str);
  }   
 }else if(len==9){
  if(str.substring(0,2)==02){
   field.value = phone_format(2,str);
  }else{
   error_numbr(str, field);
  }
 }else if(len==10){
  if(str.substring(0,2)==02){
   field.value = phone_format(2,str);
  }else{
   field.value = phone_format(3,str);
  }
 }else if(len==11){
  if(str.substring(0,2)==02){
   error_numbr(str, field);
  }else{
   field.value  = phone_format(3,str);
  }
 }else if(len==0){
  return;
 }else{
  error_numbr(str, field);
 }
}

function checkDigit(num){
 var Digit = "1234567890";
 var string = num;
 var len = string.length;
 var retVal = "";
 for (var i = 0; i < len; i++){

 }
 return retVal;
}

function phone_format(type, num){
 if(type==1){
  return num.replace(/([0-9]{4})([0-9]{4})/,"$1-$2");
 }else if(type==2){
  return num.replace(/([0-9]{2})([0-9]+)([0-9]{4})/,"$1-$2-$3");
 }else{
  return num.replace(/(^01.{1}|[0-9]{3})([0-9]+)([0-9]{4})/,"$1-$2-$3");
 }
}

function drawChart() {
	
	var chart;
	var legend;
	var chartData = [];
	var chartColor = [];
	var tempColor;
	
	var syear=  $('#syear').val();
	var smon=  $('#smon').val();
	
	$.ajax({
		type:"post",
		url:"/wims/mypage/getChartData.do",
		dataType:"json",
		data: {syear : syear, smon : smon},
		async: false,
		
		success:function(data){
			
			$.each(data,function(idx,val){
				
				if ( val['PMS_COLOR'] == null || val['PMS_COLOR'] == "" ) {
					tempColor = "#1266FF";
				} else {
					tempColor = val['PMS_COLOR'];
				}
				
				chartColor.push(tempColor);
				chartData.push({country:val['P_NAME'],value:val['W_PERCENT']});
				
				
				
				
				var chart = document.getElementById("chartdiv"); 	
				var jstatus = document.getElementById("project");
				
				
				//차트 짤리는것 방지
				if(chartData.length >= 13){
					chart.style.height =  600 + 'px';
					jstatus.style.height = 670 + 'px';
				}else if(chartData.length >= 8) {
					chart.style.height =  460 + 'px';
					jstatus.style.height = 530 + 'px';
				}else{
					chart.style.height =  360 + 'px';
					jstatus.style.height = 430 + 'px';
				}
			});
		}
	});
	
    // PIE CHART
    chart = new AmCharts.AmPieChart();
    chart.dataProvider = chartData;
    chart.titleField = "country";
    chart.valueField = "value";
    chart.outlineColor = "#FFFFFF";
    chart.outlineAlpha = 0.8;
    chart.outlineThickness = 2;
    // this makes the chart 3D
    chart.depth3D = 15;
    chart.angle = 30;
	chart.percentFormatter = {precision:1, decimalSeparator:'.', thousandsSeparator:','};
	chart.color = "#FF007F";
	chart.colors = chartColor;
	chart.startDuration = 0;
	chart.fontFamily = "돋움";
	chart.labelText = "";

	// LEGEND
	legend = new AmCharts.AmLegend();
	legend.align = "center";
	legend.markerType = "square";
	legend.valueText = " : " + legend.valueText + "시간";
	legend.valueWidth = 40;
	legend.verticalGap = 2;
	legend.fontFamily = "돋움";
	legend.fontSize = 12;
	chart.addLegend(legend);

    // WRITE
    chart.write("chartdiv");
}

			function checkCurrentWeek(selDay){
			
				var isPlan=false,
						isToday=false,
						toDay = '',
						tmpCurDay,
						lastDay='';
				var curLeng=currentWeekDay.length;

				if(currentWeekDay[0].dd > selDay) {

	           /* an. 막음.
				for(var j=0; j < curLeng; j++) {
					tmpCurDay = currentWeekDay[j];

				for(var j=0; j < curLeng; j++) {

					if(!isToday && tmpCurDay.today == 'Y') {
						isToday=true;
						toDay = tmpCurDay.dd;
					}

					if(selDay == tmpCurDay.dd) {
						if(toDay == selDay) { // 실행.

				}

		dataType:"html",

		}
	});
	
	addSpectrum();
	
}

function fn_project_select(p_id){
	
	 if($("#p_gubun").val() == 'CD00000206'){
		 $("#code").attr("disabled",true);
	 }else{
		 $("#code").attr("disabled",false);
	 }
	 
	 //유지보수일떄
	 if($("#p_gubun").val() == 'CD00000204' || $("#p_gubun").val() == 'CD00000200'){
		 $('#mainten').css('display', 'block'); 	
	 }else{
		 $('#mainten').css('display', 'none'); 	
	 }
	 
	ajax('/job/projectList.do', 'HTML',
			{
				p_gubun : $("#p_gubun").val(),
				p_code : $("#code").val()
				
			}, function (data){
				$("#p_id").html(data);
				$("#p_id").val(p_id).change();
			}
		);
	 
 } 
 
function fnCheck(){
	 

	 
		 
	if($("input:checkbox[id='holy']").is(":checked") == true){
			 $("#holy").val("true");
	}else{
			 $("#holy").val("false");
	}
		 
	 
	 
}

function fnCheckbox_able(){
	 
	 if(1130 >= Number($("#wstart_time").val()) && 1300 < Number($("#wend_time").val())){
		 $("#lunch").prop('checked', true);
		 $("#lunch_div").css("display","block");  
	 }else if(1300 >= Number($("#wend_time").val())){
		 $("#lunch_div").css("display","none");
		 $("#lunch").prop("checked", false);
	 }
	 
	  
	 if( 1730 >= Number($("#wstart_time").val()) && 1900 < Number($("#wend_time").val())){
		 $("#dinner").prop("checked", true);
		 $("#dinner_div").css("display","block");
	 }else if(2000 > Number($("#wend_time").val())){
		 $("#dinner_div").css("display","none");
		 $("#dinner").prop("checked", false);
	 }  
}
